name: Publish Package

on:
  push:
    tags:
      - "v*.*.*"
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to publish (defaults to selected ref)"
        required: false
        type: string

permissions:
  id-token: write
  contents: read

concurrency:
  group: npm-publish-${{ github.event.inputs.ref || github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.inputs.ref || github.event.release.tag_name || github.ref }}
          persist-credentials: false
      - uses: actions/setup-node@v7
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false
      - run: npm ci
      - run: npm run ci
      - name: Print runtime versions
        shell: bash
        run: |
          node --version
          npm --version
      - name: Skip already published version
        id: published
        shell: bash
        run: |
          name=$(node -p "require('./package.json').name")
          version=$(node -p "require('./package.json').version")
          set +e
          output=$(npm view "${name}@${version}" version 2>&1)
          status=$?
          set -e
          if [ "$status" -eq 0 ]; then
            echo "${name}@${version} is already published."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          elif printf '%s' "$output" | grep -Eq 'E404|404 Not Found'; then
            echo "Publishing ${name}@${version}."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          else
            printf '%s\n' "$output" >&2
            exit "$status"
          fi
      - name: Publish to npm
        if: steps.published.outputs.skip != 'true'
        shell: bash
        run: |
          set +e
          output=$(npm publish --provenance --access public 2>&1)
          status=$?
          set -e
          printf '%s\n' "$output"
          if [ "$status" -eq 0 ]; then
            exit 0
          fi
          if printf '%s' "$output" | grep -Eq 'E404|404 Not Found'; then
            echo "::error::npm publish returned 404. Check npm Trusted Publishing for pi-spotify-widget and confirm workflow filename publish.yml is registered for this repository."
          fi
          exit "$status"
